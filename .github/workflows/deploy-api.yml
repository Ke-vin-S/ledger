name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"

# Required GitHub secret:
#   AWS_DEPLOY_ROLE_ARN — ARN of the IAM role to assume via OIDC.
#   Run api/scripts/setup-lambda.sh once to create the function and this role.

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run unit tests
        run: go test ./... -race -count=1 -short

  deploy:
    name: Deploy to Lambda
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC token exchange
      contents: read
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o bootstrap ./cmd/api

      - name: Package
        run: zip function.zip bootstrap

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Deploy
        run: |
          aws lambda update-function-code \
            --function-name splitleger-api \
            --zip-file fileb://function.zip \
            --region ap-southeast-1

          aws lambda wait function-updated \
            --function-name splitleger-api \
            --region ap-southeast-1
